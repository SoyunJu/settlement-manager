spring:
  application:
    name: settlement-manager
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

server:
  port: ${BACKEND_PORT:8180}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  version: ${APP_VERSION:1.0.0}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3100}
  jwt:
    secret: ${JWT_SECRET}
    access-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  fee-rate:
    default: ${DEFAULT_FEE_RATE:0.20}
  login:
    max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
  rate-limit:
    window-minutes: ${RATE_LIMIT_WINDOW_MINUTES:30}