spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health