spring:
  datasource:
    url: jdbc:postgresql://postgres:5532/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: redis
      port: 6479
      password: ${REDIS_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  server:
    port: 8181