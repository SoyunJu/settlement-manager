spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5532}/${DB_NAME:settlement}
    username: ${DB_USER:soyun}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6479}
      password: ${REDIS_PASSWORD}

logging:
  level:
    com.settlement.manager: DEBUG
    org.springframework.security: DEBUG